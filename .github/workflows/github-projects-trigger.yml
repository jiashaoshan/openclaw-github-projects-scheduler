name: GitHub Projects → OpenClaw Trigger

on:
  projects_v2_item:
    types: [edited]

jobs:
  trigger-openclaw:
    runs-on: ubuntu-latest
    steps:
      - name: Parse Project Event
        id: parse
        uses: actions/github-script@v6
        with:
          script: |
            const item = context.payload.projects_v2_item;
            
            // 获取任务内容
            const title = item.content?.title || '无标题';
            const body = item.content?.body || '';
            const itemId = item.id;
            const nodeId = item.node_id;
            const contentId = item.content?.id || '';
            
            // 获取字段值
            const fieldValues = item.field_values || [];
            let agent = 'main';
            let status = 'Unknown';
            
            for (const fv of fieldValues) {
              const fieldName = fv.field?.name || '';
              if (fieldName === 'Agent') {
                agent = fv.name || 'main';
              }
              if (fieldName === 'Status') {
                status = fv.name || 'Unknown';
              }
            }
            
            // 只处理状态变为 "In progress" 的情况
            if (status !== 'In progress') {
              console.log(`⏭️ 状态是 "${status}"，跳过触发`);
              core.setOutput('should_trigger', 'false');
              return;
            }
            
            core.setOutput('title', title);
            core.setOutput('body', body);
            core.setOutput('agent', agent);
            core.setOutput('item_id', itemId);
            core.setOutput('content_id', contentId);
            core.setOutput('should_trigger', 'true');
            
            console.log(`🚀 GitHub Projects 任务触发`);
            console.log(`   标题: ${title}`);
            console.log(`   Agent: ${agent}`);
            console.log(`   任务ID: ${itemId}`);
            console.log(`   内容ID: ${contentId}`);
      
      - name: Create Trigger Issue
        if: steps.parse.outputs.should_trigger == 'true'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `[OpenClaw] ${{ steps.parse.outputs.agent }}: ${{ steps.parse.outputs.title }}`;
            const body = `## GitHub Projects 任务触发

**Agent:** ${{ steps.parse.outputs.agent }}
**任务ID:** ${{ steps.parse.outputs.item_id }}
**内容ID:** ${{ steps.parse.outputs.content_id }}

### 任务描述
${{ steps.parse.outputs.body }}

### 执行指令
\`\`\`bash
# 更新状态为 In progress
python3 ~/.openclaw/workspace/skills/github-projects/execute_task.py \\
  --item-id "${{ steps.parse.outputs.item_id }}" \\
  --agent "${{ steps.parse.outputs.agent }}" \\
  --title "${{ steps.parse.outputs.title }}"
\`\`\`

### 完成后执行
\`\`\`bash
# 标记任务完成
python3 ~/.openclaw/workspace/skills/github-projects/execute_task.py \\
  --item-id "${{ steps.parse.outputs.item_id }}" \\
  --complete
\`\`\`

---
*自动创建于 ${{ github.event.repository.updated_at }}*`;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['openclaw-trigger', 'agent:${{ steps.parse.outputs.agent }}']
            });
            
            console.log(`✅ Issue 创建成功: #${issue.data.number}`);
            console.log(`   URL: ${issue.data.html_url}`);
