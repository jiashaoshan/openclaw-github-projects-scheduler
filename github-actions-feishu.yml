name: GitHub Projects → OpenClaw (via Feishu)

on:
  projects_v2_item:
    types: [edited, created]

jobs:
  notify-openclaw:
    runs-on: ubuntu-latest
    steps:
      - name: Parse Project Event
        id: parse
        uses: actions/github-script@v6
        with:
          script: |
            const item = context.payload.projects_v2_item;
            
            // 获取任务内容
            const title = item.content?.title || '无标题';
            const body = item.content?.body || '';
            const itemId = item.id;
            const nodeId = item.node_id;
            
            // 获取字段值
            const fieldValues = item.field_values || [];
            let agent = 'main';
            let status = 'Unknown';
            
            for (const fv of fieldValues) {
              const fieldName = fv.field?.name || '';
              if (fieldName === 'Agent') {
                agent = fv.name || 'main';
              }
              if (fieldName === 'Status') {
                status = fv.name || 'Unknown';
              }
            }
            
            // 只处理状态变为 "In progress" 的情况
            if (status !== 'In progress') {
              console.log(`状态是 ${status}，跳过`);
              return;
            }
            
            core.setOutput('title', title);
            core.setOutput('body', body);
            core.setOutput('agent', agent);
            core.setOutput('item_id', itemId);
            core.setOutput('node_id', nodeId);
            core.setOutput('should_trigger', 'true');
            
            console.log(`任务: ${title}`);
            console.log(`Agent: ${agent}`);
            console.log(`状态: ${status}`);
      
      - name: Send to Feishu
        if: steps.parse.outputs.should_trigger == 'true'
        run: |
          curl -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "interactive",
              "card": {
                "config": {
                  "wide_screen_mode": true
                },
                "header": {
                  "title": {
                    "tag": "plain_text",
                    "content": "🚀 GitHub Projects 任务触发"
                  },
                  "template": "blue"
                },
                "elements": [
                  {
                    "tag": "div",
                    "text": {
                      "tag": "lark_md",
                      "content": "**任务:** ${{ steps.parse.outputs.title }}"
                    }
                  },
                  {
                    "tag": "div",
                    "text": {
                      "tag": "lark_md",
                      "content": "**Agent:** ${{ steps.parse.outputs.agent }}"
                    }
                  },
                  {
                    "tag": "div",
                    "text": {
                      "tag": "lark_md",
                      "content": "**任务ID:** ${{ steps.parse.outputs.item_id }}"
                    }
                  },
                  {
                    "tag": "hr"
                  },
                  {
                    "tag": "div",
                    "text": {
                      "tag": "lark_md",
                      "content": "${{ steps.parse.outputs.body }}"
                    }
                  },
                  {
                    "tag": "hr"
                  },
                  {
                    "tag": "action",
                    "actions": [
                      {
                        "tag": "button",
                        "text": {
                          "tag": "plain_text",
                          "content": "✅ 确认执行"
                        },
                        "type": "primary",
                        "value": {
                          "action": "execute",
                          "item_id": "${{ steps.parse.outputs.item_id }}",
                          "agent": "${{ steps.parse.outputs.agent }}",
                          "title": "${{ steps.parse.outputs.title }}"
                        }
                      },
                      {
                        "tag": "button",
                        "text": {
                          "tag": "plain_text",
                          "content": "❌ 忽略"
                        },
                        "type": "default",
                        "value": {
                          "action": "ignore"
                        }
                      }
                    ]
                  }
                ]
              }
            }'
